<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#d7c8b7" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />

  <title>은재 두 번째 생일에 초대합니다 🎂</title>

<meta property="og:type" content="website">
<meta property="og:title" content="은재 두 번째 생일에 초대합니다 🎂">
<meta property="og:description" content="은재의 인생 2년차 성장 이야기를 함께 만나보세요.">
<meta property="og:image" content="https://minini12345.github.io/2nd-birthday-invitation/images/thumb.jpg">
<meta property="og:url" content="https://minini12345.github.io/2nd-birthday-invitation">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://minini12345.github.io/2nd-birthday-invitation/images/thumb.jpg">
</head>
<body>
  <main class="app" id="app">
    <aside class="timeline" aria-label="성장 타임라인">
      <div class="timeline__year">2025</div>
      <div class="timeline__line"></div>
      <nav class="timeline__months" id="timelineMonths"></nav>
    </aside>

    <section class="feed" id="feed" aria-label="은재 성장 사진">
      <!-- script.js에서 12개월~23개월 카드가 자동 생성됩니다. -->
    </section>

    <section class="invitation" id="invitation">
      <p class="eyebrow">PLEASE JOIN US FOR</p>
      <h1>EUNJAE'S<br>2ND BIRTHDAY</h1>
      <p class="message">은재의 두 번째 생일을<br>함께 축하해 주세요.</p>

      <dl class="details">
        <div><dt>DATE</dt><dd>2026. 07. 25 토요일 · 12시</dd></div>
        <div><dt>PLACE</dt><dd>하모  한식당<br>(서울 강남구 언주로 819 2층)<br>압구정역 3번출구 근처</dd></div>
      </dl>

      <a class="map-button" href="https://naver.me/5uIYjE9R" aria-label="오시는 길">오시는 길</a>

    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
